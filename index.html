<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AinulTzy - Premium Profile</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* ANIMATED BACKGROUND ORBS */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: floatOrb 10s infinite alternate ease-in-out;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: rgba(0, 255, 170, 0.3);
            top: -100px; left: -100px;
        }
        .orb-2 {
            width: 350px; height: 350px;
            background: rgba(170, 0, 255, 0.3);
            bottom: -50px; right: -50px;
            animation-delay: -5s;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.2); }
        }

        /* CONTAINER */
        .container {
            max-width: 600px;
            width: 90%;
            margin: 50px auto;
            z-index: 1;
        }

        /* GLASSMORPHISM CARD */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transform-style: preserve-3d;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* PROFILE PICTURE */
        .profile-wrapper {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 20px auto;
            transform: translateZ(30px); /* 3D pop effect */
        }
        
        .profile-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid transparent;
            background: linear-gradient(#050505, #050505) padding-box, 
                        linear-gradient(45deg, #00ffaa, #aa00ff) border-box;
            box-shadow: 0 0 25px rgba(0, 255, 170, 0.5);
            animation: pulseGlow 2s infinite alternate;
        }

        @keyframes pulseGlow {
            from { box-shadow: 0 0 15px rgba(0, 255, 170, 0.3); }
            to { box-shadow: 0 0 35px rgba(170, 0, 255, 0.6); }
        }

        /* TYPOGRAPHY */
        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #00ffaa, #aa00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            transform: translateZ(20px);
        }

        .typewriter-text {
            color: #a0a0a0;
            font-size: 0.95rem;
            margin-bottom: 30px;
            min-height: 24px;
            transform: translateZ(15px);
        }

        /* SOCIAL BUTTONS */
        .social-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 40px;
            transform: translateZ(25px);
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .social-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: all 0.5s ease;
        }

        .social-btn:hover::before {
            left: 100%;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(0, 255, 170, 0.5);
            box-shadow: 0 5px 15px rgba(0, 255, 170, 0.2);
            transform: translateY(-3px);
        }

        .social-btn i {
            font-size: 1.2rem;
            background: linear-gradient(45deg, #00ffaa, #aa00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* BIODATA SECTION */
        .bio-container {
            text-align: left;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 25px;
            border-left: 4px solid #00ffaa;
            transform: translateZ(20px);
        }

        .bio-title {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 3px;
            margin-bottom: 20px;
            color: #fff;
            text-transform: uppercase;
        }

        .bio-list {
            list-style: none;
        }

        .bio-list li {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            font-size: 0.9rem;
        }

        .bio-list li:last-child {
            border-bottom: none;
        }

        .bio-label {
            font-weight: 600;
            color: #a0a0a0;
        }

        .bio-value {
            font-weight: 400;
            text-align: right;
            max-width: 60%;
        }
        
        /* Audio Player Hidden */
        audio {
            display: none;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="https://github.com/Chandra-XD/cn-grabbed-result/raw/main/sound/Soegi%20Bornean%20Asmalibrasi.mp3" autoplay loop></audio>

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="container">
        <div class="glass-card" data-tilt data-tilt-max="10" data-tilt-speed="400" data-tilt-glare data-tilt-max-glare="0.2">
            
            <div class="profile-wrapper">
                <img src="https://avatars.githubusercontent.com/AinulStore" alt="Profile Picture">
            </div>

            <h1>Ainul Riskian</h1>
            <div class="typewriter-text" id="typewriter"></div>

            <div class="social-grid">
                <a href="..." class="social-btn" target="_blank">
                    <i class="fab fa-whatsapp"></i> Hubungi WhatsApp
                </a>
                <a href="..." class="social-btn" target="_blank">
                    <i class="fab fa-instagram"></i> Follow Instagram
                </a>
                <a href="..." class="social-btn" target="_blank">
                    <i class="fab fa-tiktok"></i> Follow TikTok
                </a>
                <a href="..." class="social-btn" target="_blank">
                    <i class="fas fa-users"></i> Group Store / Mabar
                </a>
            </div>

            <div class="bio-container">
                <div class="bio-title"><i class="fas fa-id-card"></i> BIODATA DIRI</div>
                <ul class="bio-list">
                    <li><span class="bio-label">Nama Lengkap</span> <span class="bio-value">Ainul Riskian</span></li>
                    <li><span class="bio-label">Nama Panggilan</span> <span class="bio-value">Null</span></li>
                    <li><span class="bio-label">Umur</span> <span class="bio-value">18 Tahun</span></li>
                    <li><span class="bio-label">Alamat / Domisili</span> <span class="bio-value">Banjarmasin</span></li>
                    <li><span class="bio-label">Pekerjaan</span> <span class="bio-value">Programmer</span></li>
                    <li><span class="bio-label">Hobi</span> <span class="bio-value">Singing</span></li>
                    <li><span class="bio-label">Status</span> <span class="bio-value" style="color: #00ffaa;">Jomblo dari lahir 😂</span></li>
                </ul>
            </div>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    
    <script>
        // Efek Ngetik
        const text = "It's Me Reall Ainul | Software Engineer";
        const speed = 100;
        let i = 0;
        
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            }
        }
        
        // Mulai animasi pas halaman diload
        window.onload = function() {
            setTimeout(typeWriter, 500);
            
            // Play musik otomatis (jika diizinkan browser)
            document.body.addEventListener('click', function() {
                document.getElementById('bgMusic').play();
            }, { once: true });
        };
    </script>
</body>
</html>
